<form [formGroup]="supplierForm" (ngSubmit)="onSubmit()">

  <!-- Name -->
  <input id="name" type="text" formControlName="name" />
  <div
    id="name-error"
    class="error"
    *ngIf="supplierForm.get('name')?.touched && supplierForm.get('name')?.invalid"
  >
    Name is required
  </div>

  <!-- Email -->
  <input id="email" type="email" formControlName="email" />
  <div
    id="email-error"
    class="error"
    *ngIf="supplierForm.get('email')?.touched && supplierForm.get('email')?.invalid"
  >
    Email is required and must be valid
  </div>

  <!-- Username -->
  <input id="username" type="text" formControlName="username" />
  <div
    id="username-error"
    class="error"
    *ngIf="supplierForm.get('username')?.touched && supplierForm.get('username')?.invalid"
  >
    Username is required
  </div>

  <!-- Password -->
  <input id="password" type="password" formControlName="password" />
  <div
    id="password-error"
    class="error"
    *ngIf="supplierForm.get('password')?.touched && supplierForm.get('password')?.invalid"
  >
    Password is required (min 6 characters)
  </div>

  <button type="submit">Submit</button>
</form>
